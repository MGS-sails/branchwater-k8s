apiVersion: apps/v1
kind: Deployment
metadata:
  name: index-deployment
  namespace: mgnifybranchwater-hl-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: index
  template:
    metadata:
      labels:
        app: index
    spec:
      containers:
      - name: index
        image: mgsdev/mgnify-bw-index-alpha@sha256:9a374d6452eddd1e4e1d2b699ff98d0b16f2f8126770cf9a7b0f8e264d257ec2
#        image: mgsdev/mgnify-bw-index-alpha@sha256:329c9be810763c3243b1603252fc8934ec0764380ed989e7f7c0d4e598dc5edf
#        image: mgsdev/mgnify-bw-index-alpha@sha256:817896ebbb99a67a6106054c2f1a8ac9fd3132437c8ded3332921fcbd9b348f4
#        image: mgsdev/mgnify-bw-index-alpha:latest
#        image: mgsdev/mgnify-bw-index:latest
        command: [ "/app/bin/branchwater-server" ]
        args: [ "--port", "80", "-k21", "--location", "/data/sigs.zip", "/data/sigs_indexed" ]
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: prod-env
        volumeMounts:
        - name: bw-db
          mountPath: /data
      volumes:
      - name: bw-db
        persistentVolumeClaim:
#          claimName: complete-index-pvc
          claimName: ucd-index-pvc
#          claimName: index-updated-sketches-pvc
